<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Exam Parser — Upload</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; max-width: 700px; margin: 40px auto; padding: 20px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 1.3em; }
  .card { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  label { display: block; margin-bottom: 8px; font-size: 0.95em; color: #ccc; }
  input, button { font-size: 1em; }
  button { padding: 12px 32px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .btn-primary { background: #4fc3f7; color: #1a1a2e; }
  .btn-primary:hover { background: #29b6f6; }
  .btn-primary:disabled { background: #555; color: #999; cursor: not-allowed; }
  .drop-zone {
    border: 2px dashed #555;
    border-radius: 8px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4fc3f7; background: rgba(79,195,247,0.05); }
  .drop-zone p { color: #888; margin-top: 8px; font-size: 0.85em; }
  .drop-zone .icon { font-size: 2em; }
  #fileInput { display: none; }
  .file-list { margin-top: 12px; }
  .file-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin-bottom: 4px; background: #222; border-radius: 4px; }
  .file-row .name { flex: 1; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row .remove { color: #f77; cursor: pointer; font-weight: bold; padding: 2px 8px; }
  .file-row .remove:hover { color: #f44; }
  .file-row .size { color: #888; font-size: 0.8em; min-width: 60px; text-align: right; }
  #status { margin-top: 12px; font-size: 0.9em; min-height: 24px; }
  .status-ok { color: #4caf50; }
  .status-err { color: #f77; }
  .nav { text-align: center; margin-bottom: 20px; }
  .nav a { color: #4fc3f7; }
  .progress { margin-top: 12px; }
  .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; background: #4fc3f7; transition: width 0.3s; border-radius: 3px; }
</style>
</head>
<body>

<div class="nav"><a href="/tasks">← Task list</a></div>
<h1>New Exam Task</h1>

<div class="card">
  <label>Select exam page images (JPG/PNG, in page order)</label>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📄</div>
    <p>Click to select files, or drag & drop here</p>
    <p style="font-size:0.75em;color:#666;">First file = Page 1, second = Page 2, …</p>
  </div>
  <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" multiple onchange="handleFiles(this.files)">
  <div class="file-list" id="fileList"></div>
  <div class="progress" id="progressArea" style="display:none;">
    <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div id="progressText" style="margin-top:6px;font-size:0.85em;color:#888;"></div>
  </div>
  <div id="status"></div>
  <button class="btn-primary" id="uploadBtn" onclick="uploadAll()" disabled style="margin-top:16px;">Upload &amp; Process</button>
</div>

<script>
let selectedFiles = [];

function handleFiles(files) {
  selectedFiles = Array.from(files).filter(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    return ['jpg','jpeg','png'].includes(ext);
  });
  renderFileList();
}

function renderFileList() {
  const container = document.getElementById('fileList');
  const btn = document.getElementById('uploadBtn');
  if (selectedFiles.length === 0) {
    container.innerHTML = '';
    btn.disabled = true;
    return;
  }
  btn.disabled = false;
  container.innerHTML = selectedFiles.map((f, i) => `
    <div class="file-row" draggable="true">
      <span style="color:#4fc3f7;min-width:24px;">${i + 1}.</span>
      <span class="name">${f.name}</span>
      <span class="size">${formatSize(f.size)}</span>
      <span class="remove" onclick="removeFile(${i})" title="Remove">✕</span>
    </div>
  `).join('');
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  renderFileList();
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

// Drag & drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

// Drag reorder within file list
const fileList = document.getElementById('fileList');
fileList.addEventListener('dragstart', e => {
  const row = e.target.closest('.file-row');
  if (row) { e.dataTransfer.setData('text/plain', row.querySelector('.name').textContent); row.classList.add('dragging'); }
});
fileList.addEventListener('dragend', e => {
  const row = e.target.closest('.file-row');
  if (row) row.classList.remove('dragging');
});

async function uploadAll() {
  if (selectedFiles.length === 0) return;

  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('status');
  const progressArea = document.getElementById('progressArea');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');

  btn.disabled = true;
  status.textContent = 'Creating task...';
  status.className = '';
  progressArea.style.display = 'block';

  try {
    // Step 1: Create task
    const createR = await fetch('/tasks', { method: 'POST' });
    if (!createR.ok) throw new Error('Failed to create task');
    const { task_id } = await createR.json();

    // Step 2: Upload all files at once
    const form = new FormData();
    for (const f of selectedFiles) {
      form.append('files', f);
    }

    status.textContent = `Uploading ${selectedFiles.length} page(s)...`;
    progressFill.style.width = '30%';
    progressText.textContent = 'Uploading images...';

    const uploadR = await fetch(`/tasks/${task_id}/pages`, { method: 'POST', body: form });
    if (!uploadR.ok) {
      const err = await uploadR.json();
      throw new Error(err.detail || 'Upload failed');
    }

    const result = await uploadR.json();
    progressFill.style.width = '100%';
    progressText.textContent = `✓ ${result.pages_uploaded} pages submitted for OCR`;

    if (result.pages_failed > 0) {
      status.className = 'status-err';
      status.innerHTML = `${result.pages_uploaded} uploaded, ${result.pages_failed} failed. <a href="/tasks/${task_id}" style="color:#4fc3f7;">View task →</a>`;
    } else {
      status.className = 'status-ok';
      status.innerHTML = `All ${result.pages_uploaded} pages processing. <a href="/tasks/${task_id}" style="color:#4fc3f7;">View task →</a>`;
    }

    // Auto-redirect after a short delay
    setTimeout(() => { window.location.href = `/tasks/${task_id}`; }, 1500);

  } catch (e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'status-err';
    btn.disabled = false;
    progressArea.style.display = 'none';
  }
}
</script>
</body>
</html>
