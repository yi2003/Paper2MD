<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; max-width: 800px; margin: 40px auto; padding: 20px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 1.3em; }
  .nav { text-align: center; margin-bottom: 20px; }
  .nav a { color: #4fc3f7; }
  table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
  th, td { padding: 12px 16px; text-align: left; }
  th { background: #1a1a2e; color: #888; font-size: 0.8em; text-transform: uppercase; }
  tr { border-bottom: 1px solid #2a2a4e; }
  tr:last-child { border-bottom: none; }
  a { color: #4fc3f7; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .status { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.8em; font-weight: 600; }
  .status-pending { background: #444; color: #aaa; }
  .status-processing { background: #1a3a5c; color: #4fc3f7; }
  .status-done { background: #1a3c1a; color: #4caf50; }
  .status-partial { background: #5c3a1a; color: #f90; }
  .status-failed { background: #3c1a1a; color: #f77; }
  .empty { text-align: center; color: #666; padding: 40px; }
  .btn-new { display: inline-block; padding: 10px 28px; background: #4fc3f7; color: #1a1a2e; border-radius: 6px; text-decoration: none; font-weight: 600; margin-bottom: 20px; }
  .btn-new:hover { background: #29b6f6; text-decoration: none; }
</style>
</head>
<body>

<h1>Tasks</h1>
<div style="text-align:center;margin-bottom:20px;"><a href="/" class="btn-new">+ New Task</a></div>

{% if tasks %}
<table>
  <tr><th>Task ID</th><th>Status</th><th>Created</th><th>Actions</th></tr>
  {% for t in tasks %}
  <tr>
    <td><code>{{ t.id }}</code></td>
    <td><span class="status status-{{ t.status }}">{{ t.status }}</span></td>
    <td>{{ t.created_at | ts_to_date }}</td>
    <td>
      <a href="/tasks/{{ t.id }}">view</a>
      {% if t.status == 'done' %}
      | <a href="/tasks/{{ t.id }}/edit">edit</a>
      | <a href="/tasks/{{ t.id }}/download">download</a>
      {% endif %}
    </td>
  </tr>
  {% endfor %}
</table>
{% else %}
<div class="empty">No tasks yet. <a href="/">Create one →</a></div>
{% endif %}

</body>
</html>
